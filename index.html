<html lang="en">

    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
      /* ── Reset ─────────────────────────────────── */
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg:         #000000;
        --text:       #06ffa5;
        --out-text:   #c8c8c8;
        --prompt:     #00f5ff;
        --command:    #06ffa5;
        --label:      #00f5ff;
        --muted:      #555555;
        --error:      #ff5555;
        --border:     #ffff00;
      }

      html, body {
        width: 100%;
        min-height: 100vh;
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        overflow-x: hidden;
      }

      body { padding: 1rem; }

      /* ── Banner ─────────────────────────────────── */
      .banner {
        max-width: 900px;
        margin: 0 auto 1.5rem;
        padding: 1.25rem 2rem;
        border: 1px solid rgba(255, 255, 0, 0.4);
        background: rgba(255, 255, 0, 0.02);
        text-align: center;
      }

      .banner-title {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--border);
        letter-spacing: 0.08em;
        margin-bottom: 0.4rem;
      }

      .banner-text {
        color: var(--muted);
        font-size: 0.85rem;
        margin: 0.2rem 0;
      }

      .banner-media {
        margin: 1rem 0;
      }

      .banner-media img {
        max-width: 100%;
        max-height: 200px;
        display: block;
        margin: 0 auto;
        border: 1px solid rgba(255, 255, 0, 0.3);
        transition: box-shadow 0.2s ease;
      }

      .banner-media img:hover {
        box-shadow: 0 0 10px rgba(255, 255, 0, 0.2);
      }

      .banner-email {
        color: var(--muted);
        font-size: 0.85rem;
        margin-top: 0.6rem;
      }

      .banner-email a {
        color: var(--prompt);
        text-decoration: none;
        border-bottom: 1px solid rgba(0, 245, 255, 0.35);
        transition: border-color 0.2s ease;
      }

      .banner-email a:hover {
        border-bottom-color: var(--prompt);
      }

      /* ── Terminal window ─────────────────────────── */
      .terminal-wrapper {
        max-width: 900px;
        margin: 0 auto;
        border: 2px solid var(--border);
        background: var(--bg);
        display: flex;
        flex-direction: column;
        max-height: 88vh;
        overflow: hidden;
        box-shadow:
          0 0 0 1px rgba(255, 255, 0, 0.08),
          0 0 40px rgba(255, 255, 0, 0.08),
          0 0 80px rgba(255, 255, 0, 0.03);
      }

      /* ── Titlebar ───────────────────────────────── */
      .terminal-titlebar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.6rem 1rem;
        border-bottom: 1px solid rgba(255, 255, 0, 0.2);
        background: rgba(255, 255, 0, 0.025);
        flex-shrink: 0;
      }

      .terminal-title {
        color: rgba(255, 255, 0, 0.6);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        user-select: none;
      }

      .terminal-buttons {
        display: flex;
        gap: 6px;
      }

      .terminal-btn {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        transition: filter 0.15s ease, transform 0.15s ease;
      }

      .terminal-btn:nth-child(1) { background: #ff5f56; }
      .terminal-btn:nth-child(2) { background: #ffbd2e; }
      .terminal-btn:nth-child(3) { background: #27c93f; }

      .terminal-btn:hover {
        filter: brightness(1.25);
        transform: scale(1.15);
      }

      .terminal-btn:active {
        transform: scale(0.9);
      }

      /* ── Content area ───────────────────────────── */
      .terminal-content {
        flex: 1;
        overflow-y: auto;
        padding: 1.25rem 1.5rem 0.5rem;
        display: flex;
        flex-direction: column;
      }

      .terminal-content::-webkit-scrollbar { width: 5px; }
      .terminal-content::-webkit-scrollbar-track { background: transparent; }
      .terminal-content::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 0, 0.25);
        border-radius: 3px;
      }
      .terminal-content::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 0, 0.45);
      }
      * { scrollbar-width: thin; scrollbar-color: rgba(255, 255, 0, 0.25) transparent; }

      /* ── Command echo line ──────────────────────── */
      .cmd-echo {
        display: flex;
        gap: 0.65rem;
        align-items: baseline;
        margin-top: 1.1rem;
        flex-shrink: 0;
      }

      .p-glyph {
        color: var(--prompt);
        font-weight: 700;
        white-space: nowrap;
        flex-shrink: 0;
        font-size: 0.9rem;
        user-select: none;
      }

      .cmd-text {
        color: var(--command);
        font-weight: 600;
        font-size: 0.9rem;
      }

      /* ── Output lines ───────────────────────────── */
      .out {
        padding-left: 1rem;
        color: var(--out-text);
        font-size: 0.9rem;
        line-height: 1.8;
        white-space: pre-wrap;
        word-break: break-word;
        flex-shrink: 0;
      }

      .out.blank {
        line-height: 0;
        padding: 0;
        height: 0.6rem;
        user-select: none;
      }

      .out.sys {
        padding-left: 0;
        color: var(--muted);
        font-size: 0.85rem;
        line-height: 1.7;
      }

      /* ── Inline spans ───────────────────────────── */
      .lbl { color: var(--label); }
      .arr { color: var(--prompt); }
      .err { color: var(--error); }
      .dim { color: var(--muted); }

      /* ── Links in output ────────────────────────── */
      a {
        color: var(--prompt);
        text-decoration: none;
        border-bottom: 1px solid rgba(0, 245, 255, 0.3);
        transition: border-color 0.15s ease;
      }

      a:hover {
        border-bottom-color: var(--prompt);
      }

      /* ── Divider ────────────────────────────────── */
      .divider {
        border: none;
        border-top: 1px solid rgba(255, 255, 0, 0.12);
        margin: 0.9rem 0 0;
        flex-shrink: 0;
      }

      /* ── Input area ─────────────────────────────── */
      .terminal-input-area {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        padding: 0.85rem 1.5rem;
        border-top: 1px solid rgba(255, 255, 0, 0.2);
        background: rgba(255, 255, 0, 0.015);
        flex-shrink: 0;
      }

      .input-display {
        flex: 1;
        display: flex;
        align-items: center;
        cursor: text;
        overflow: hidden;
      }

      #inputMirror {
        color: var(--command);
        font-size: 0.9rem;
        font-family: inherit;
        white-space: pre;
      }

      #cursor {
        display: inline-block;
        color: var(--text);
        font-size: 0.9rem;
        animation: cursorBlink 1.1s step-end infinite;
        user-select: none;
        margin-left: 1px;
      }

      #cursor.busy {
        opacity: 0;
        animation: none;
      }

      @keyframes cursorBlink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* Hidden but focusable input */
      #terminalInput {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        opacity: 0;
        border: none;
        outline: none;
        background: transparent;
        font-family: inherit;
        font-size: 0.9rem;
      }

      /* ── Responsive ─────────────────────────────── */
      @media (max-width: 768px) {
        body { padding: 0.5rem; }
        .terminal-wrapper { max-height: 92vh; }
        .terminal-content { padding: 1rem 1rem 0.5rem; }
        .terminal-input-area { padding: 0.75rem 1rem; }
        .banner { padding: 1rem; }
      }
    </style>
  </head>

    <!-- Banner -->

          <span id="inputMirror"></span><span id="cursor">▊</span>
        </div>
        <input type="text" id="terminalInput" autocomplete="off" spellcheck="false" />
      </div>

    <script>
      // ── DOM refs ──────────────────────────────────
      const out      = document.getElementById('terminalOutput');
      const input    = document.getElementById('terminalInput');
      const mirror   = document.getElementById('inputMirror');
      const cursor   = document.getElementById('cursor');
      const wrapper  = document.getElementById('terminalWrapper');

      // ── State ─────────────────────────────────────
      let cmdHistory = [];
      let histIdx    = -1;
      let busy       = false;

      // ── Helpers ───────────────────────────────────
      const sleep = ms => new Promise(r => setTimeout(r, ms));

      function scrollBottom() {
        out.scrollTop = out.scrollHeight;
      }

      function escHtml(s) {
        return s
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function updateMirror(val) {
        mirror.textContent = val;
      }

      function setBusy(state) {
        busy  = state;
        input.disabled = state;
        if (state) {
          cursor.classList.add('busy');
        } else {
          cursor.classList.remove('busy');
          input.focus();
        }
      }

      // ── Append helpers ────────────────────────────
      function appendSys(html) {
        const el = document.createElement('div');
        el.className = 'out sys';
        el.innerHTML = html;
        out.appendChild(el);
        scrollBottom();
      }

      function appendOut(html) {
        const el = document.createElement('div');
        if (html === '') {
          el.className = 'out blank';
        } else {
          el.className = 'out';
          el.innerHTML = html;
        }
        out.appendChild(el);
        scrollBottom();
      }

      function appendDivider() {
        const el = document.createElement('hr');
        el.className = 'divider';
        out.appendChild(el);
        scrollBottom();
      }

      // ── Line-by-line print with delay ─────────────
      async function printLines(lines, delay = 22) {
        for (const line of lines) {
          await sleep(delay);
          appendOut(line);
        }
      }

        status: [

          '  <span class="arr">&#x2192;</span>  full contact information  <span class="dim">(try: contact)</span>',
          '  <span class="arr">&#x2192;</span>  project archive  <span class="dim">(github.com/zaccesss)</span>',
          '  <span class="arr">&#x2192;</span>  cv available on request  <span class="dim">(try: cv)</span>',
          '',

          '  <span class="arr">&#x2192;</span>  case studies and writeups',

        ],

        cv: [

          '',
          '  <span class="arr">&#x2192;</span>  <a href="cv.pdf" download>cv.pdf</a>  <span class="dim">[download]</span>',
          '',

          '  education &amp; qualifications',
          '  technical skills',
          '  work experience',
          '  projects &amp; achievements',
          '  certifications',
          '',
          '<span class="lbl">additional info:</span>',
          '  <a href="mailto:contact@zacess.com">contact@zacess.com</a>',
        ],

        // clear is handled specially in runCommand — entry here ensures tab completion works
        clear: [],

      };

      const cmdList = Object.keys(commands);

      // ── Run a command ─────────────────────────────
      async function runCommand(raw) {
        const name = raw.trim().toLowerCase();
        if (!name) return;

        setBusy(true);

        if (name === 'clear') {
          out.innerHTML = '';
          setBusy(false);
          return;
        }

        // Echo the command
        const echo = document.createElement('div');
        echo.className = 'cmd-echo';
        echo.innerHTML =
          `<span class="p-glyph">zacess@portfolio:~$</span>` +
          `<span class="cmd-text">${escHtml(raw)}</span>`;
        out.appendChild(echo);
        scrollBottom();

        await sleep(90); // execution delay — feels like it's running

        if (!commands[name]) {
          appendOut(`<span class="err">bash: ${escHtml(name)}: command not found</span>`);
          appendOut(`<span class="dim">type &#39;help&#39; to list available commands</span>`);
        } else {
          await printLines(commands[name]);
        }

        appendDivider();
        setBusy(false);
      }

      // ── Input events ──────────────────────────────
      input.addEventListener('keydown', function (e) {

        if (e.key === 'Enter') {
          e.preventDefault();
          const val = this.value.trim();
          if (!val || busy) return;
          cmdHistory.unshift(val);
          histIdx = -1;
          updateMirror('');
          this.value = '';
          runCommand(val);
          return;
        }

        if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (histIdx < cmdHistory.length - 1) {
            histIdx++;
            this.value = cmdHistory[histIdx];
            updateMirror(this.value);
          }
          return;
        }

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (histIdx > 0) {
            histIdx--;
            this.value = cmdHistory[histIdx];
          } else {
            histIdx = -1;
            this.value = '';
          }
          updateMirror(this.value);
          return;
        }

        if (e.key === 'Tab') {
          e.preventDefault();
          const partial = this.value.trim().toLowerCase();
          if (!partial) return;
          const matches = cmdList.filter(c => c.startsWith(partial));
          if (matches.length === 1) {
            this.value = matches[0];
            updateMirror(this.value);
          } else if (matches.length > 1) {
            const echo = document.createElement('div');
            echo.className = 'cmd-echo';
            echo.innerHTML =
              `<span class="p-glyph">zacess@portfolio:~$</span>` +
              `<span class="cmd-text">${escHtml(this.value)}</span>`;
            out.appendChild(echo);
            appendOut(`<span class="dim">${matches.join('  ')}</span>`);
            appendDivider();
            scrollBottom();
          }
          return;
        }

      });

      input.addEventListener('input', function () {
        updateMirror(this.value);
      });

      // ── Click anywhere to focus ───────────────────
      document.addEventListener('click', function () {
        if (!busy) input.focus();
      });

      // ── Terminal buttons ──────────────────────────
      document.getElementById('btnClose').addEventListener('click', function (e) {
        e.stopPropagation();
        wrapper.style.opacity = '0.35';
        wrapper.style.pointerEvents = 'none';
      });

      document.getElementById('btnMin').addEventListener('click', function (e) {
        e.stopPropagation();
        const content  = document.getElementById('terminalOutput');
        const inputBar = document.querySelector('.terminal-input-area');
        const isMin    = content.style.display === 'none';
        content.style.display  = isMin ? '' : 'none';
        inputBar.style.display = isMin ? '' : 'none';
      });

      document.getElementById('btnMax').addEventListener('click', function (e) {
        e.stopPropagation();
        const banner = document.getElementById('banner');
        if (wrapper._maximised) {
          Object.assign(wrapper.style, {
            position: '', top: '', left: '', right: '', bottom: '',
            maxWidth: '', maxHeight: '', zIndex: '', margin: '', border: '',
          });
          banner.style.display = '';
          document.body.style.padding = '';
          wrapper._maximised = false;
        } else {
          Object.assign(wrapper.style, {
            position: 'fixed', top: '0', left: '0', right: '0', bottom: '0',
            maxWidth: '100%', maxHeight: '100%', zIndex: '9999', margin: '0',
            border: 'none',
          });
          banner.style.display = 'none';
          document.body.style.padding = '0';
          wrapper._maximised = true;
        }
        if (!busy) input.focus();
      });

      // ── Boot sequence ─────────────────────────────
      async function boot() {
        const bootLines = [
          'ZacessOS v1.0.0-beta',
          'kernel: initialising...',
          'user: zacess  |  host: portfolio',
          'environment: ready',
        ];

        for (const line of bootLines) {
          await sleep(110);
          appendSys(line);
        }

        appendDivider();
        await sleep(220);

        // Auto-show help (no echo — system-initiated)
        await printLines(commands.help, 18);
        appendDivider();

        input.focus();
      }

      window.addEventListener('load', boot);
    </script>
  </body>
</html>
