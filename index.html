<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Terminal landing page for Isaac (Zac) Adjei - Electronic Engineering and Computer Science student at Aston University"
    />
    <meta name="author" content="Isaac Adjei" />
    <title>zacess — Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ========== Reset & Base Styles ========== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #000000;
        --text: #06ffa5;
        --prompt: #00f5ff;
        --command: #06ffa5;
        --output: #ff00ff;
        --border: #ffff00;
        --muted: #888888;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      html,
      body {
        width: 100%;
        min-height: 100vh;
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        overflow-x: hidden;
      }

      body {
        padding: 1rem;
      }

      .banner {
        max-width: 900px;
        margin: 0 auto 2rem;
        padding: 2rem;
        border: 2px solid var(--border);
        background: rgba(255, 255, 0, 0.05);
        text-align: center;
        animation: slideDown 0.4s ease;
        transition: var(--transition);
      }

      .banner:hover {
        background: rgba(255, 255, 0, 0.08);
      }

      .banner-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--border);
        margin-bottom: 1rem;
      }

      .banner-media {
        margin: 1.5rem 0;
        text-align: center;
      }

      .banner-media img {
        max-width: 100%;
        max-height: 250px;
        border: 1px solid var(--border);
        border-radius: 2px;
        transition: var(--transition);
      }

      .banner-media img:hover {
        box-shadow: 0 0 15px rgba(255, 255, 0, 0.3);
      }

      .banner-text {
        color: var(--text);
        margin-bottom: 0.5rem;
        line-height: 1.8;
      }

      .banner-email {
        color: var(--prompt);
        font-weight: 600;
        margin-top: 1rem;
      }

      .banner-email a {
        color: var(--prompt);
        text-decoration: underline;
      }

      a {
        color: var(--output);
        text-decoration: underline;
        transition: var(--transition);
        border-bottom: 2px solid var(--output);
        padding-bottom: 2px;
      }

      a:hover {
        opacity: 0.8;
        box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
      }

      a::after {
        content: '';
      }

      a[href*='cv.pdf']::after {
        content: ' [click here]';
        font-size: 0.85em;
        opacity: 0.7;
        transition: opacity var(--transition);
      }

      a[href*='cv.pdf']:hover::after {
        opacity: 1;
      }

      /* ========== Terminal Window ========== */
      .terminal-wrapper {
        max-width: 900px;
        margin: 0 auto;
        border: 2px solid var(--border);
        background: var(--bg);
        display: flex;
        flex-direction: column;
        max-height: 90vh;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(255, 255, 0, 0.3);
      }

      .terminal-titlebar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 1rem;
        border-bottom: 2px solid var(--border);
        background: var(--bg);
        font-weight: 600;
        font-size: 0.9rem;
      }

      .terminal-title {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--border);
        font-weight: 700;
      }

      .terminal-buttons {
        display: flex;
        gap: 0.5rem;
      }

      .terminal-btn {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: none;
        background: #ff5f56;
        cursor: pointer;
        transition: var(--transition);
      }

      .terminal-btn:nth-child(2) {
        background: #ffbd2e;
      }

      .terminal-btn:nth-child(3) {
        background: #27c93f;
      }

      .terminal-btn:hover {
        opacity: 0.9;
        transform: scale(1.15);
      }

      .terminal-btn:active {
        transform: scale(0.95);
        opacity: 0.7;
      }

      /* ========== Terminal Content ========== */
      .terminal-content {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        word-wrap: break-word;
      }

      /* Custom scrollbar */
      .terminal-content::-webkit-scrollbar {
        width: 10px;
      }

      .terminal-content::-webkit-scrollbar-track {
        background: var(--bg);
      }

      .terminal-content::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
        box-shadow: 0 0 10px rgba(255, 255, 0, 0.3);
      }

      .terminal-content::-webkit-scrollbar-thumb:hover {
        background: var(--output);
        box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
      }

      /* ========== Terminal Lines ========== */
      .terminal-line {
        display: flex;
        gap: 0.5rem;
        align-items: flex-start;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .prompt {
        color: var(--prompt);
        font-weight: 700;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .command {
        color: var(--command);
        font-weight: 600;
      }

      .output {
        color: var(--output);
        opacity: 0.95;
        line-height: 1.7;
        margin-left: 3rem;
      }

      .output-section {
        margin: 0.75rem 0;
      }

      .output-label {
        color: var(--muted);
        text-transform: uppercase;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        margin: 0.75rem 0 0.5rem 0;
      }

      .output-value {
        margin: 0.25rem 0;
        color: var(--text);
      }

      .output-list {
        list-style: none;
        margin: 0.5rem 0 0.5rem 1.5rem;
      }

      .output-list li {
        margin: 0.25rem 0;
        color: var(--text);
      }

      .output-list li:before {
        content: '→ ';
        color: var(--prompt);
        margin-right: 0.5rem;
      }

      /* Grid for skills */
      .output-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 0.75rem;
        margin: 0.5rem 0;
      }

      .grid-item {
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--muted);
        color: var(--text);
        font-size: 0.9rem;
      }

      /* Media section */
      .media-container {
        margin: 1rem 0;
        text-align: center;
        border: 1px solid var(--text);
        padding: 1rem;
        background: rgba(6, 255, 165, 0.02);
      }

      .media-container img {
        max-width: 100%;
        max-height: 250px;
        display: inline-block;
      }

      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 1rem 0;
        opacity: 0.3;
      }

      /* ========== Input Area ========== */
      .terminal-input-area {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 1rem;
        border-top: 2px solid var(--border);
        background: var(--bg);
        flex-shrink: 0;
      }

      .terminal-input-area .prompt {
        flex-shrink: 0;
      }

      #terminalInput {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--text);
        font-family: inherit;
        font-size: 0.95rem;
        outline: none;
        caret-color: var(--text);
      }

      #terminalInput::placeholder {
        color: var(--muted);
      }

      /* ========== Responsive ========== */
      @media (max-width: 768px) {
        body {
          padding: 0.5rem;
        }

        .terminal-wrapper {
          max-height: 95vh;
        }

        .terminal-content {
          padding: 1rem;
          gap: 0.75rem;
        }

        .output {
          margin-left: 2rem;
        }

        .media-container img {
          max-height: 200px;
        }

        .terminal-titlebar {
          font-size: 0.8rem;
          padding: 0.5rem 0.75rem;
        }
      }

      /* ========== Scrollbar for Firefox ========== */
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--border) var(--bg);
      }
    </style>
  </head>
  <body>
    <!-- Animated Banner -->
    <div class="banner">
      <div class="banner-title">⚠️ Site Under Construction</div>
      <div class="banner-text">Portfolio currently being rebuilt for Q2 2026</div>
      <div class="banner-text">Use the terminal below to explore my info</div>

      <div class="banner-media">
        <img
          src="giphy.gif"

      </div>

      <div class="banner-email">
        Have questions? Email <a href="mailto:contact@zacess.com">contact@zacess.com</a>

    </div>

    <div class="terminal-wrapper">
      <!-- Terminal Titlebar -->
      <div class="terminal-titlebar">
        <div class="terminal-title">

        </div>
        <div class="terminal-buttons">

          <button class="terminal-btn" title="close"></button>
        </div>
      </div>

      <!-- Terminal Content -->
      <div class="terminal-content" id="terminalOutput">
        <div class="media-container">
          <img

        <hr class="divider" />

        <div class="terminal-line">

      <!-- Terminal Input -->
      <div class="terminal-input-area">
        <span class="prompt">$</span>
        <input
          type="text"
          id="terminalInput"
          placeholder="Enter command..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </div>

    <!-- ========== Command Data ========== -->
    <script>
      const commands = {
        whoiszac: {
          name: 'whoiszac',
          output: `Isaac (Zac) Adjei

        journey: {
          name: 'journey',
          output: `Migration:

        },

        projects: {
          name: 'projects',
          output: `Featured Projects:

NeoPixel LED Cube
  Arduino-based interactive 3D LED display. Custom-coded in C++ with
  addressable RGB control. Demonstrates embedded systems integration
  and real-time control.

Two-Stage Audio Amplifier

More Projects:

        },

        skills: {
          name: 'skills',
          output: `Programming Languages:
  C       C++      Python   Java     JavaScript   PHP

        },

        experience: {
          name: 'experience',
          output: `British Airways
Engineering Simulation Internship
  Worked on system modeling and analysis for aerospace applications.

Yunex Traffic
Smart Mobility Systems
  Contributed to IoT and embedded solutions for intelligent transportation.

Ghana High Commission
Administrative and Technical Support
  Supporting international operations and diplomatic initiatives.

Core Competencies:
  → Embedded Systems Development
  → Hardware-Software Integration

        },

        contact: {
          name: 'contact',
          output: `Primary Email:
  contact@zacess.com

Secondary Email:
  offices.isaac@gmail.com

Availability:
  Open to internships, placements, and collaborations

Response Time:
  Typically within 24-48 hours

Preferred Contact Method:
  Email with project details / GitHub discussion threads

Collaboration Interests:
  → Embedded Systems Projects
  → Hardware Design & Prototyping
  → Full-Stack Web Development
  → IoT & Smart Systems
  → Open Source Contributions`,
        },

        links: {
          name: 'links',
          output: `GitHub:
  github.com/zaccesss
  Projects, open source, and code repositories

LinkedIn:
  linkedin.com/in/isaacadjei
  Professional profile, experience, endorsements

Email:
  contact@zacess.com

This Portfolio:
  Terminal-style landing page — Minimal, fast, professional.`,
        },

        status: {
          name: 'status',
          output: `Current Status:
Portfolio being rebuilt for Q2 2026 release

Temporary Landing Page:

        },

        cv: {
          name: 'cv',
          output: `Curriculum Vitae:

→ Download CV (PDF)
  cv.pdf

  → Education & Qualifications

        },

        help: {
          name: 'help',
          output: `Available Commands:

  whoiszac    - About me and what I do
  journey     - My story and background
  projects    - Featured projects
  skills      - Technical skills & technologies
  experience  - Work experience
  contact     - Contact information & availability
  links       - GitHub, LinkedIn, and other links
  cv          - View or download CV (PDF)
  status      - Portfolio update status
  help        - Show this message
  clear       - Clear terminal screen`,
        },

        clear: {
          name: 'clear',
          output: null,
        },
      };

      const terminalOutput = document.getElementById('terminalOutput');
      const terminalInput = document.getElementById('terminalInput');

      function convertLinksToHTML(text) {
        // Convert URLs, emails, and PDF files to clickable links
        return text.replace(
          /([a-zA-Z0-9.-]+@[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}|(?:https?:\/\/)?(?:www\.)?[a-zA-Z0-9-]+(?:\.[a-zA-Z0-9-]+)+(?:\/[^\s]*)?|[a-zA-Z0-9_-]+\.pdf)/g,
          function (match) {
            if (match.includes('@')) {
              return `<a href="mailto:${match}">${match}</a>`;
            } else if (match.endsWith('.pdf')) {
              return `<a href="${match}" target="_blank" download>${match}</a>`;
            } else if (!match.startsWith('http')) {
              return `<a href="https://${match}" target="_blank">${match}</a>`;
            } else {
              return `<a href="${match}" target="_blank">${match}</a>`;
            }
          },
        );
      }

      function displayCommand(commandName) {
        const cmd = commands[commandName] || commands.help;

        // Special case: clear command
        if (commandName === 'clear' || commandName === '') {
          terminalOutput.innerHTML = '';
          return;
        }

        // Add command line to output
        const commandLine = document.createElement('div');
        commandLine.className = 'terminal-line';
        commandLine.innerHTML = `
                <span class="prompt">$</span>
                <span class="command">${commandName}</span>
            `;
        terminalOutput.appendChild(commandLine);

        // Add output
        const outputLine = document.createElement('div');
        outputLine.className = 'output';
        outputLine.innerHTML = convertLinksToHTML(cmd.output).replace(/\n/g, '<br>');
        outputLine.style.whiteSpace = 'pre-wrap';
        terminalOutput.appendChild(outputLine);

        // Add divider
        const divider = document.createElement('hr');
        divider.className = 'divider';
        terminalOutput.appendChild(divider);

        // Scroll to bottom
        terminalOutput.scrollTop = terminalOutput.scrollHeight;
      }

      // Handle input
      terminalInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
          const command = this.value.trim().toLowerCase();

          if (command) {
            displayCommand(command);
            this.value = '';
          }
        }
      });

      // Focus input on page load
      terminalInput.focus();

      // Terminal button functionality
      const terminalButtons = document.querySelectorAll('.terminal-btn');
      const terminalWrapper = document.querySelector('.terminal-wrapper');
      const banner = document.querySelector('.banner');

      terminalButtons[0].addEventListener('click', function () {
        // Minimize
        terminalWrapper.style.display = 'none';
      });

      terminalButtons[1].addEventListener('click', function () {
        // Maximize/Restore
        if (terminalWrapper.style.display === 'none') {
          terminalWrapper.style.display = 'flex';
          terminalInput.focus();
        }
      });

      terminalButtons[2].addEventListener('click', function () {
        // Close
        terminalWrapper.style.opacity = '0.5';
        terminalWrapper.style.pointerEvents = 'none';
        banner.style.marginBottom = '1rem';
      });

      // Show help on load
      window.addEventListener('load', function () {
        displayCommand('help');
      });
    </script>
  </body>
</html>
